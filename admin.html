<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>لوحة تحكم متجر طُرفة — تسجيل الدخول</title>
<style>
  :root{ --green:#002617; --green-light:#0a4a32; --gold:#c9a84c; --bg:#f4f1ea;
    --card:#fffdf8; --ink:#1c1c1c; --muted:#6b6b6b; --line:#e2ddd0; --err:#c0392b; --ok:#1f7a4d; }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Segoe UI",Tahoma,system-ui,sans-serif;background:
    radial-gradient(circle at 15% 0%,rgba(201,168,76,.08),transparent 40%),
    radial-gradient(circle at 85% 100%,rgba(0,38,23,.06),transparent 40%),var(--bg);
    color:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:18px;
    padding:34px 28px;width:100%;max-width:400px;box-shadow:0 8px 30px rgba(0,0,0,.08)}
  .logo{text-align:center;margin-bottom:8px}
  .logo .badge{display:inline-flex;align-items:center;gap:9px;background:var(--green);
    color:#fff;padding:9px 22px;border-radius:999px;font-weight:700}
  .logo .dot{width:8px;height:8px;border-radius:50%;background:var(--gold)}
  h1{font-size:1.25rem;color:var(--green);text-align:center;margin:18px 0 4px}
  .sub{text-align:center;color:var(--muted);font-size:.9rem;margin-bottom:22px}
  label{display:block;font-weight:600;font-size:.9rem;margin:14px 0 6px;color:var(--green)}
  input{width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:11px;
    font-size:1rem;font-family:inherit;transition:.2s}
  input:focus{outline:none;border-color:var(--gold)}
  .btn{width:100%;margin-top:22px;background:var(--green);color:#fff;border:none;
    border-radius:11px;padding:13px;font-size:1rem;font-weight:700;cursor:pointer;
    font-family:inherit;transition:.2s}
  .btn:hover:not(:disabled){background:var(--green-light)}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .msg{margin-top:16px;padding:11px 14px;border-radius:10px;font-size:.88rem;
    font-weight:600;display:none}
  .msg.show{display:block}
  .msg.err{background:rgba(192,57,43,.08);color:var(--err);border:1px solid rgba(192,57,43,.25)}
  .msg.ok{background:rgba(31,122,77,.1);color:var(--ok);border:1px solid rgba(31,122,77,.25)}
  .logged{display:none;text-align:center}
  .logged.show{display:block}
  .logged .email{font-weight:700;color:var(--green);margin:10px 0}
  .btn-out{background:#fff;color:var(--err);border:1.5px solid var(--err);margin-top:14px}
  .btn-out:hover{background:rgba(192,57,43,.06)}
</style>
</head>
<body>
<div class="card">
  <div class="logo"><span class="badge"><span class="dot"></span> متجر طُرفة</span></div>

  <!-- نموذج الدخول -->
  <div id="loginView">
    <h1>لوحة التحكم</h1>
    <p class="sub">سجّل دخولك للمتابعة</p>

    <label for="email">البريد الإلكتروني</label>
    <input type="email" id="email" autocomplete="username" placeholder="you@example.com">

    <label for="password">كلمة المرور</label>
    <input type="password" id="password" autocomplete="current-password" placeholder="••••••••">

    <button class="btn" id="loginBtn">تسجيل الدخول</button>
    <div id="msg" class="msg"></div>
  </div>

  <!-- بعد الدخول -->
  <div id="loggedView" class="logged">
    <h1>✅ تم تسجيل الدخول</h1>
    <p class="sub">أهلاً بك في لوحة تحكم طُرفة</p>
    <p class="email" id="userEmail"></p>
    <p class="sub">لوحة إدارة المنتجات ستُضاف هنا في الخطوة القادمة.</p>
    <button class="btn btn-out" id="logoutBtn">تسجيل الخروج</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // ====================================================
  // 🟢 عدّل سطر المفتاح فقط (نفس مفتاح turfa-supabase.js):
  // ====================================================
  const SUPABASE_URL = "https://fneboifhuwrhkmdtjswh.supabase.co";
  const SUPABASE_KEY = "sb_publishable_e_-aX1xnWnfGJXWvPbObcg_Dbt6vTNr";
  // ====================================================

  const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const loginView = document.getElementById('loginView');
  const loggedView = document.getElementById('loggedView');
  const msg = document.getElementById('msg');
  const loginBtn = document.getElementById('loginBtn');

  function showMsg(text, type) {
    msg.textContent = text;
    msg.className = 'msg show ' + type;
  }

  function showLoggedIn(user) {
    loginView.style.display = 'none';
    loggedView.classList.add('show');
    document.getElementById('userEmail').textContent = user.email;
  }

  async function doLogin() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    if (!email || !password) { showMsg('عبّي البريد وكلمة المرور.', 'err'); return; }

    loginBtn.disabled = true;
    loginBtn.textContent = 'جاري الدخول...';
    const { data, error } = await client.auth.signInWithPassword({ email, password });
    loginBtn.disabled = false;
    loginBtn.textContent = 'تسجيل الدخول';

    if (error) {
      showMsg('البريد أو كلمة المرور غير صحيحة.', 'err');
      return;
    }
    showLoggedIn(data.user);
  }

  async function doLogout() {
    await client.auth.signOut();
    loggedView.classList.remove('show');
    loginView.style.display = 'block';
    document.getElementById('password').value = '';
    msg.className = 'msg';
  }

  // لو المستخدم داخل من قبل، نوديه مباشرة للوحة
  async function checkSession() {
    const { data } = await client.auth.getSession();
    if (data.session) showLoggedIn(data.session.user);
  }

  loginBtn.addEventListener('click', doLogin);
  document.getElementById('logoutBtn').addEventListener('click', doLogout);
  document.getElementById('password').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
  checkSession();
</script>
</body>
</html>
